<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>
    <style>
        #image {
            width: 600px;
            height: 400px;
            border: 2px solid #333;
            margin-bottom: 20px;
            background-color: #f4f4f4;
            background-image: url('');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            line-height: 400px;
            text-align: center;
            font-size: 20px;
            color: #222;
        }

        img {
            width: 180px;
            height: 120px;
            margin: 10px;
            cursor: pointer;
            border: 2px solid #999;
        }
    </style>
</head>
<body>

    <div id="image">Hover over an image below to display here.</div>

    <img src="https://via.placeholder.com/600x400?text=Image+1"
         alt="Beautiful mountain landscape"
         onmouseover="upDate(this)"
         onmouseout="unDo()">

    <img src="https://via.placeholder.com/600x400?text=Image+2"
         alt="Calm beach at sunset"
         onmouseover="upDate(this)"
         onmouseout="unDo()">

    <img src="https://via.placeholder.com/600x400?text=Image+3"
         alt="Green forest path"
         onmouseover="upDate(this)"
         onmouseout="unDo()">

    <script>
        function upDate(previewPic) {
            console.log("Mouse over image");
            console.log("Alt text:", previewPic.alt);
            console.log("Source:", previewPic.src);

            const imageDiv = document.getElementById("image");
            imageDiv.innerHTML = previewPic.alt;
            imageDiv.style.backgroundImage = "url('" + previewPic.src + "')";
        }

        function unDo() {
            console.log("Mouse left image");

            const imageDiv = document.getElementById("image");
            imageDiv.innerHTML = "Hover over an image below to display here.";
            imageDiv.style.backgroundImage = "url('')";
        }
    </script>

</body>
</html>
